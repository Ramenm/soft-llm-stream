<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Raw stream compared with soft reveal</title>
  <desc id="desc">A visual comparison showing raw streamed chunks arriving in big jumps while soft-llm-stream reveals the same content smoothly.</desc>
  <defs>
    <linearGradient id="bg" x1="34" y1="16" x2="1160" y2="398" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080d17"/>
      <stop offset="0.45" stop-color="#0b1422"/>
      <stop offset="1" stop-color="#0a2019"/>
    </linearGradient>
    <radialGradient id="hot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(316 320) rotate(-20) scale(430 220)">
      <stop stop-color="#ffb86b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffb86b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(890 300) rotate(-150) scale(440 230)">
      <stop stop-color="#87f0c1" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#87f0c1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="38" fill="#05070b"/>
  <rect x="14" y="14" width="1172" height="392" rx="30" fill="url(#bg)" stroke="rgba(255,255,255,0.1)"/>
  <rect x="14" y="14" width="1172" height="392" rx="30" fill="url(#hot)"/>
  <rect x="14" y="14" width="1172" height="392" rx="30" fill="url(#cool)"/>

  <text x="42" y="56" fill="#7bdff6" font-size="12" font-family="Inter, Arial, sans-serif" letter-spacing="2.2">WHAT VIEWERS NOTICE</text>
  <text x="42" y="106" fill="#f5f8ff" font-size="48" font-weight="850" font-family="Inter, Arial, sans-serif">Same chunks. Less visual shock.</text>
  <text x="44" y="142" fill="#aebfe1" font-size="18" font-family="Inter, Arial, sans-serif">The backend timing stays honest; only the frontend reveal becomes calmer.</text>

  <g transform="translate(70 190)" filter="url(#shadow)">
    <rect width="474" height="158" rx="28" fill="rgba(8,13,22,0.75)" stroke="rgba(255,184,107,0.26)"/>
    <text x="28" y="42" fill="#ffb86b" font-size="12" font-family="Inter, Arial, sans-serif" letter-spacing="1.8">WITHOUT SMOOTHING</text>
    <text x="28" y="78" fill="#f5f8ff" font-size="30" font-weight="850" font-family="Inter, Arial, sans-serif">wait… then a wall of text</text>
    <path d="M28 124 H94 V100 H162 V124 H222 V92 H292 V114 H366 V88 H424" fill="none" stroke="#ffb86b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="142" fill="#9fb0cf" font-size="14" font-family="Inter, Arial, sans-serif">Large jumps make a chat answer feel buffered and abrupt.</text>
  </g>

  <g transform="translate(656 190)" filter="url(#shadow)">
    <rect width="474" height="158" rx="28" fill="rgba(8,13,22,0.75)" stroke="rgba(135,240,193,0.28)"/>
    <text x="28" y="42" fill="#87f0c1" font-size="12" font-family="Inter, Arial, sans-serif" letter-spacing="1.8">WITH SOFT-LLM-STREAM</text>
    <text x="28" y="78" fill="#f5f8ff" font-size="30" font-weight="850" font-family="Inter, Arial, sans-serif">smooth reveal, same chunks</text>
    <path d="M28 126 C88 122 132 114 182 106 C248 94 318 90 424 88" fill="none" stroke="#87f0c1" stroke-width="5" stroke-linecap="round"/>
    <text x="28" y="142" fill="#9fb0cf" font-size="14" font-family="Inter, Arial, sans-serif">Meta phases stay separate, while answer text moves smoothly.</text>
  </g>

  <g transform="translate(314 368)">
    <circle cx="0" cy="0" r="5" fill="#ffb86b"/>
    <text x="14" y="5" fill="#aebfe1" font-size="14" font-family="Inter, Arial, sans-serif">raw frontend delivery</text>
    <circle cx="206" cy="0" r="5" fill="#87f0c1"/>
    <text x="220" y="5" fill="#aebfe1" font-size="14" font-family="Inter, Arial, sans-serif">library-smoothed visible text</text>
  </g>
</svg>
