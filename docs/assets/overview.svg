<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">soft-llm-stream overview</title>
  <desc id="desc">A compact overview: provider chunks enter one headless controller, become normalized events, then render as steady UI text.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="24" x2="1160" y2="404" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f"/>
      <stop offset="0.52" stop-color="#0b1624"/>
      <stop offset="1" stop-color="#0b241c"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 104) rotate(22) scale(480 220)">
      <stop stop-color="#7bdff6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7bdff6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(990 310) rotate(-160) scale(520 220)">
      <stop stop-color="#87f0c1" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#87f0c1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="38" fill="#05070b"/>
  <rect x="14" y="14" width="1172" height="392" rx="30" fill="url(#bg)" stroke="rgba(255,255,255,0.1)"/>
  <rect x="14" y="14" width="1172" height="392" rx="30" fill="url(#glowBlue)"/>
  <rect x="14" y="14" width="1172" height="392" rx="30" fill="url(#glowGreen)"/>

  <text x="42" y="56" fill="#7bdff6" font-size="12" font-family="Inter, Arial, sans-serif" letter-spacing="2.2">HOW IT WORKS</text>
  <text x="42" y="106" fill="#f5f8ff" font-size="48" font-weight="850" font-family="Inter, Arial, sans-serif">One controller. Many frontends.</text>
  <text x="44" y="142" fill="#aebfe1" font-size="18" font-family="Inter, Arial, sans-serif">No framework lock-in. Same stream in, calmer snapshot out.</text>

  <g transform="translate(66 187)" filter="url(#shadow)">
    <rect width="256" height="146" rx="26" fill="rgba(8,13,22,0.76)" stroke="rgba(123,223,246,0.25)"/>
    <text x="28" y="40" fill="#7bdff6" font-size="12" font-family="Inter, Arial, sans-serif" letter-spacing="1.7">INPUT</text>
    <text x="28" y="76" fill="#f5f8ff" font-size="26" font-weight="800" font-family="Inter, Arial, sans-serif">SSE · JSONL</text>
    <text x="28" y="106" fill="#f5f8ff" font-size="26" font-weight="800" font-family="Inter, Arial, sans-serif">events</text>
    <text x="28" y="130" fill="#9fb0cf" font-size="14" font-family="Inter, Arial, sans-serif">Provider chunks and SDK iterables</text>
  </g>

  <g transform="translate(440 174)" filter="url(#shadow)">
    <rect width="320" height="168" rx="30" fill="rgba(5,9,15,0.74)" stroke="rgba(135,240,193,0.3)"/>
    <text x="30" y="44" fill="#87f0c1" font-size="12" font-family="Inter, Arial, sans-serif" letter-spacing="1.7">CORE CONTRACT</text>
    <text x="30" y="80" fill="#f5f8ff" font-size="30" font-weight="850" font-family="Inter, Arial, sans-serif">text · replace</text>
    <text x="30" y="112" fill="#f5f8ff" font-size="30" font-weight="850" font-family="Inter, Arial, sans-serif">meta · done</text>
    <text x="30" y="140" fill="#aebfe1" font-size="15" font-family="Inter, Arial, sans-serif">Normalize first. Reveal only answer text.</text>
    <text x="30" y="160" fill="#87f0c1" font-size="14" font-family="Inter, Arial, sans-serif">grapheme-safe · idle-soft · tail-safe</text>
  </g>

  <g transform="translate(878 187)" filter="url(#shadow)">
    <rect width="256" height="146" rx="26" fill="rgba(8,13,22,0.76)" stroke="rgba(135,240,193,0.24)"/>
    <text x="28" y="40" fill="#7bdff6" font-size="12" font-family="Inter, Arial, sans-serif" letter-spacing="1.7">OUTPUT</text>
    <text x="28" y="76" fill="#f5f8ff" font-size="25" font-weight="800" font-family="Inter, Arial, sans-serif">browser · React</text>
    <text x="28" y="106" fill="#f5f8ff" font-size="25" font-weight="800" font-family="Inter, Arial, sans-serif">CLI wrappers</text>
    <text x="28" y="130" fill="#9fb0cf" font-size="14" font-family="Inter, Arial, sans-serif">Render snapshot.text anywhere</text>
  </g>

  <path d="M322 260 C364 260 388 260 430 260" stroke="#7bdff6" stroke-width="4" stroke-linecap="round"/>
  <path d="M760 260 C802 260 826 260 868 260" stroke="#87f0c1" stroke-width="4" stroke-linecap="round"/>
  <circle cx="430" cy="260" r="8" fill="#7bdff6"/>
  <circle cx="868" cy="260" r="8" fill="#87f0c1"/>

  <g opacity="0.58">
    <rect x="96" y="352" width="58" height="8" rx="4" fill="#7bdff6"/>
    <rect x="166" y="352" width="96" height="8" rx="4" fill="#7bdff6"/>
    <rect x="890" y="352" width="56" height="8" rx="4" fill="#87f0c1"/>
    <rect x="958" y="352" width="74" height="8" rx="4" fill="#87f0c1"/>
    <rect x="1044" y="352" width="42" height="8" rx="4" fill="#87f0c1"/>
  </g>
</svg>
